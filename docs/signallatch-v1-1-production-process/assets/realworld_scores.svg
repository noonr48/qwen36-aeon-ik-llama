<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Real-world ClawCode harness scores</title>
  <desc id="desc">Grouped bar chart of normalized verifier component scores for selected SignalLatch v1.1 candidates, original SignalLatch baseline, and Unsloth baselines across KritaLite, SyncBoard, and legacy-codebase migration.</desc>
  <rect width="1180" height="620" fill="#ffffff"/>
  <text x="44" y="50" font-family="system-ui,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#17211f">Real-world harness scores</text>
  <text x="44" y="80" font-family="system-ui,Segoe UI,sans-serif" font-size="15" fill="#58635f">Scores are verifier components passed divided by total components. Higher is better.</text>

  <g font-family="system-ui,Segoe UI,sans-serif" font-size="13" fill="#58635f">
    <line x1="250" y1="112" x2="1110" y2="112" stroke="#d8dfdb"/>
    <line x1="250" y1="212" x2="1110" y2="212" stroke="#d8dfdb"/>
    <line x1="250" y1="312" x2="1110" y2="312" stroke="#d8dfdb"/>
    <line x1="250" y1="412" x2="1110" y2="412" stroke="#d8dfdb"/>
    <line x1="250" y1="512" x2="1110" y2="512" stroke="#17211f" stroke-width="1.5"/>
    <text x="214" y="116">100%</text>
    <text x="222" y="216">75%</text>
    <text x="222" y="316">50%</text>
    <text x="222" y="416">25%</text>
    <text x="230" y="516">0%</text>
  </g>

  <g font-family="system-ui,Segoe UI,sans-serif" font-size="13" fill="#17211f">
    <text x="310" y="548" text-anchor="middle">KritaLite</text>
    <text x="620" y="548" text-anchor="middle">SyncBoard</text>
    <text x="930" y="548" text-anchor="middle">Legacy-codebase</text>
  </g>

  <g>
    <!-- KritaLite: c154 .867, c718 .933, release .800, unsloth_iq4 .933, unsloth_q8 .933 -->
    <rect x="242" y="165" width="28" height="347" fill="#315f93"/>
    <rect x="274" y="139" width="28" height="373" fill="#126b5d"/>
    <rect x="306" y="192" width="28" height="320" fill="#8c4f17"/>
    <rect x="338" y="139" width="28" height="373" fill="#7a8580"/>
    <rect x="370" y="139" width="28" height="373" fill="#b48412"/>

    <!-- SyncBoard: c154 .947, c718 .842, release .947, unsloth_iq4 .947, unsloth_q8 1.0 -->
    <rect x="552" y="133" width="28" height="379" fill="#315f93"/>
    <rect x="584" y="175" width="28" height="337" fill="#126b5d"/>
    <rect x="616" y="133" width="28" height="379" fill="#8c4f17"/>
    <rect x="648" y="133" width="28" height="379" fill="#7a8580"/>
    <rect x="680" y="112" width="28" height="400" fill="#b48412"/>

    <!-- Legacy-codebase: c154 1.0, c718 1.0, release .842, unsloth_iq4 .895, unsloth_q8 .947 -->
    <rect x="862" y="112" width="28" height="400" fill="#315f93"/>
    <rect x="894" y="112" width="28" height="400" fill="#126b5d"/>
    <rect x="926" y="175" width="28" height="337" fill="#8c4f17"/>
    <rect x="958" y="154" width="28" height="358" fill="#7a8580"/>
    <rect x="990" y="133" width="28" height="379" fill="#b48412"/>
  </g>

  <g font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#17211f">
    <text x="242" y="157">13/15</text>
    <text x="274" y="131">14/15</text>
    <text x="306" y="184">12/15</text>
    <text x="338" y="131">14/15</text>
    <text x="370" y="131">14/15</text>

    <text x="552" y="125">18/19</text>
    <text x="584" y="167">16/19</text>
    <text x="616" y="125">18/19</text>
    <text x="648" y="125">18/19</text>
    <text x="680" y="104">19/19</text>

    <text x="862" y="104">19/19</text>
    <text x="894" y="104">19/19</text>
    <text x="926" y="167">16/19</text>
    <text x="958" y="146">17/19</text>
    <text x="990" y="125">18/19</text>
  </g>

  <g font-family="system-ui,Segoe UI,sans-serif" font-size="13">
    <rect x="70" y="140" width="14" height="14" fill="#315f93"/><text x="92" y="152" fill="#17211f">v1.1 Plus / c154</text>
    <rect x="70" y="166" width="14" height="14" fill="#126b5d"/><text x="92" y="178" fill="#17211f">v1.1 Lite / c718</text>
    <rect x="70" y="192" width="14" height="14" fill="#8c4f17"/><text x="92" y="204" fill="#17211f">Original SignalLatch</text>
    <rect x="70" y="218" width="14" height="14" fill="#7a8580"/><text x="92" y="230" fill="#17211f">Unsloth IQ4_NL</text>
    <rect x="70" y="244" width="14" height="14" fill="#b48412"/><text x="92" y="256" fill="#17211f">Unsloth Q8_0</text>
  </g>
</svg>
