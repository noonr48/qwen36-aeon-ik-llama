<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Why Lite and Plus were selected</title>
  <desc id="desc">Selection matrix comparing the release role, strongest evidence, and limiting tradeoff for c718 Lite, c154 Plus, c204, and the original SignalLatch baseline.</desc>
  <rect width="1180" height="520" fill="#fbfcf9"/>
  <text x="44" y="52" font-family="system-ui,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#17211f">Selection matrix</text>
  <text x="44" y="84" font-family="system-ui,Segoe UI,sans-serif" font-size="15" fill="#58635f">This is the public decision trace: evidence, rule, and outcome.</text>

  <g font-family="system-ui,Segoe UI,sans-serif">
    <rect x="56" y="126" width="250" height="300" rx="8" fill="#ffffff" stroke="#126b5d" stroke-width="2"/>
    <text x="78" y="160" font-size="20" font-weight="800" fill="#126b5d">c718 / Lite</text>
    <text x="78" y="196" font-size="14" fill="#17211f">Rule: best smaller public file</text>
    <text x="78" y="226" font-size="14" fill="#58635f">Evidence:</text>
    <text x="96" y="252" font-size="13" fill="#58635f">KritaLite 14/15</text>
    <text x="96" y="276" font-size="13" fill="#58635f">Legacy-codebase 19/19</text>
    <text x="96" y="300" font-size="13" fill="#58635f">Hard habit 0.9286</text>
    <text x="78" y="340" font-size="14" fill="#8c4f17">Tradeoff:</text>
    <text x="96" y="366" font-size="13" fill="#58635f">SyncBoard 16/19</text>
    <text x="78" y="402" font-size="13" font-weight="800" fill="#17211f">Outcome: publish as Lite</text>

    <rect x="334" y="126" width="250" height="300" rx="8" fill="#ffffff" stroke="#126b5d" stroke-width="2"/>
    <text x="356" y="160" font-size="20" font-weight="800" fill="#126b5d">c154 / Plus</text>
    <text x="356" y="196" font-size="14" fill="#17211f">Rule: best practical quality</text>
    <text x="356" y="226" font-size="14" fill="#58635f">Evidence:</text>
    <text x="374" y="252" font-size="13" fill="#58635f">KritaLite 13/15</text>
    <text x="374" y="276" font-size="13" fill="#58635f">SyncBoard 18/19</text>
    <text x="374" y="300" font-size="13" fill="#58635f">Legacy-codebase 19/19</text>
    <text x="356" y="340" font-size="14" fill="#8c4f17">Tradeoff:</text>
    <text x="374" y="366" font-size="13" fill="#58635f">18.34 GB, not top hard rank</text>
    <text x="356" y="402" font-size="13" font-weight="800" fill="#17211f">Outcome: publish as Plus</text>

    <rect x="612" y="126" width="250" height="300" rx="8" fill="#ffffff" stroke="#d8dfdb"/>
    <text x="634" y="160" font-size="20" font-weight="800" fill="#315f93">c204</text>
    <text x="634" y="196" font-size="14" fill="#17211f">Rule: no fragile codebase behavior</text>
    <text x="634" y="226" font-size="14" fill="#58635f">Evidence:</text>
    <text x="652" y="252" font-size="13" fill="#58635f">SyncBoard 19/19</text>
    <text x="652" y="276" font-size="13" fill="#58635f">Hard habit 0.9143</text>
    <text x="634" y="316" font-size="14" fill="#8f2f20">Blocking issue:</text>
    <text x="652" y="342" font-size="13" fill="#58635f">Legacy-codebase 8/19</text>
    <text x="634" y="402" font-size="13" font-weight="800" fill="#17211f">Outcome: reject for release</text>

    <rect x="890" y="126" width="250" height="300" rx="8" fill="#ffffff" stroke="#d8dfdb"/>
    <text x="912" y="160" font-size="20" font-weight="800" fill="#8c4f17">Original Q4NL</text>
    <text x="912" y="196" font-size="14" fill="#17211f">Rule: keep as historical baseline</text>
    <text x="912" y="226" font-size="14" fill="#58635f">Evidence:</text>
    <text x="930" y="252" font-size="13" fill="#58635f">KritaLite 12/15</text>
    <text x="930" y="276" font-size="13" fill="#58635f">SyncBoard 18/19</text>
    <text x="930" y="300" font-size="13" fill="#58635f">Legacy-codebase 16/19</text>
    <text x="912" y="340" font-size="14" fill="#8c4f17">Read:</text>
    <text x="930" y="366" font-size="13" fill="#58635f">Stable, but surpassed by v1.1</text>
    <text x="912" y="402" font-size="13" font-weight="800" fill="#17211f">Outcome: retain as baseline</text>
  </g>
</svg>
