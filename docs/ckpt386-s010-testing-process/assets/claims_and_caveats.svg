<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="670" viewBox="0 0 1600 670">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5f6f7a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#17212b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="670" fill="#f7f9fb"/>
  <text x="56" y="68" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#1f2933">
<tspan x="56" dy="0">Keep the communication honest</tspan>
</text>
  <text x="56" y="112" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="56" dy="0">The writeup should explain the win clearly without making it bigger than the evidence.</tspan>
</text>
  <rect x="90" y="175" width="410" height="180" rx="14" fill="#eaf6ee" stroke="#c9d2d9" stroke-width="2"/>
<rect x="90" y="175" width="10" height="180" rx="5" fill="#2f8f57"/>
<text x="120" y="223" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1f2933">
<tspan x="120" dy="0">Claim we can make</tspan>
</text>
<text x="120" y="265" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="120" dy="0">On this Q4NL coding-agent matrix,</tspan>
<tspan x="120" dy="26">s0.10 improved the previous AEON</tspan>
<tspan x="120" dy="26">RYS Q4NL deployment.</tspan>
</text>
<rect x="595" y="175" width="410" height="180" rx="14" fill="#f8e9e6" stroke="#c9d2d9" stroke-width="2"/>
<rect x="595" y="175" width="10" height="180" rx="5" fill="#b85042"/>
<text x="625" y="223" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1f2933">
<tspan x="625" dy="0">Claim we should avoid</tspan>
</text>
<text x="625" y="265" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="625" dy="0">This is not proof of a universal</tspan>
<tspan x="625" dy="26">chat or BF16 upgrade.</tspan>
</text>
<rect x="1100" y="175" width="410" height="180" rx="14" fill="#fbf1df" stroke="#c9d2d9" stroke-width="2"/>
<rect x="1100" y="175" width="10" height="180" rx="5" fill="#b98020"/>
<text x="1130" y="223" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1f2933">
<tspan x="1130" dy="0">Runtime caveat</tspan>
</text>
<text x="1130" y="265" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="1130" dy="0">One repeat row hit an invalid-diff</tspan>
<tspan x="1130" dy="26">server crash, so deployment should</tspan>
<tspan x="1130" dy="26">guard that path.</tspan>
</text>
<rect x="230" y="430" width="500" height="150" rx="14" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<rect x="230" y="430" width="10" height="150" rx="5" fill="#2f6f9f"/>
<text x="260" y="478" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1f2933">
<tspan x="260" dy="0">Public wording</tspan>
</text>
<text x="260" y="520" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="260" dy="0">Practical coding-agent fine-tuned Q4NL variant</tspan>
<tspan x="260" dy="26">of AEON RYS 15/20.</tspan>
</text>
<rect x="870" y="430" width="550" height="155" rx="14" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<rect x="870" y="430" width="10" height="155" rx="5" fill="#6d5fa8"/>
<text x="900" y="478" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1f2933">
<tspan x="900" dy="0">Deployment wording</tspan>
</text>
<text x="900" y="520" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="900" dy="0">Use the merged GGUF with custom qwen36-aeon-ik-llama,</tspan>
<tspan x="900" dy="26">Jinja, DeepSeek reasoning, graph split, and flash</tspan>
<tspan x="900" dy="26">attention.</tspan>
</text>
</svg>
