<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5f6f7a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#17212b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="760" fill="#f7f9fb"/>
  <text x="56" y="68" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#1f2933">
<tspan x="56" dy="0">The testing ladder</tspan>
</text>
  <text x="56" y="112" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="56" dy="0">Each stage answered a different question. Only the last stages answered the upload question.</tspan>
</text>
  <circle cx="115" cy="203" r="34" fill="#2f6f9f"/>
<text x="115" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff">
<tspan x="115" dy="0">1</tspan>
</text>
<rect x="175" y="165" width="1130" height="78" rx="12" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<text x="205" y="199" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#1f2933">
<tspan x="205" dy="0">Behavior probes</tspan>
</text>
<text x="520" y="198" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="520" dy="0">Small response tests showed full-strength LoRA was too aggressive.</tspan>
</text>
<rect x="1340" y="182" width="145" height="42" rx="21" fill="#2f6f9f"/>
<text x="1412" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">
<tspan x="1412" dy="0">scouting</tspan>
</text>
<line x1="115" y1="237" x2="115" y2="267" stroke="#c9d2d9" stroke-width="5" stroke-linecap="round"/>
<circle cx="115" cy="308" r="34" fill="#248f7b"/>
<text x="115" y="319" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff">
<tspan x="115" dy="0">2</tspan>
</text>
<rect x="175" y="270" width="1130" height="78" rx="12" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<text x="205" y="304" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#1f2933">
<tspan x="205" dy="0">Canvas demo</tspan>
</text>
<text x="520" y="303" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="520" dy="0">Krita-like app task tested whether the model could build a coherent</tspan>
<tspan x="520" dy="26">demo.</tspan>
</text>
<rect x="1340" y="287" width="145" height="42" rx="21" fill="#248f7b"/>
<text x="1412" y="315" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">
<tspan x="1412" dy="0">practical</tspan>
</text>
<line x1="115" y1="342" x2="115" y2="372" stroke="#c9d2d9" stroke-width="5" stroke-linecap="round"/>
<circle cx="115" cy="413" r="34" fill="#b98020"/>
<text x="115" y="424" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff">
<tspan x="115" dy="0">3</tspan>
</text>
<rect x="175" y="375" width="1130" height="78" rx="12" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<text x="205" y="409" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#1f2933">
<tspan x="205" dy="0">Merged GGUF check</tspan>
</text>
<text x="520" y="408" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="520" dy="0">BF16 merged GGUF showed the adapter could work in the ik-llama lane.</tspan>
</text>
<rect x="1340" y="392" width="145" height="42" rx="21" fill="#b98020"/>
<text x="1412" y="420" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">
<tspan x="1412" dy="0">format</tspan>
</text>
<line x1="115" y1="447" x2="115" y2="477" stroke="#c9d2d9" stroke-width="5" stroke-linecap="round"/>
<circle cx="115" cy="518" r="34" fill="#2f8f57"/>
<text x="115" y="529" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff">
<tspan x="115" dy="0">4</tspan>
</text>
<rect x="175" y="480" width="1130" height="78" rx="12" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<text x="205" y="514" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#1f2933">
<tspan x="205" dy="0">Q4NL sweep</tspan>
</text>
<text x="520" y="513" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="520" dy="0">s0.05 through s0.25 were tested in the deploy quantization.</tspan>
</text>
<rect x="1340" y="497" width="145" height="42" rx="21" fill="#2f8f57"/>
<text x="1412" y="525" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">
<tspan x="1412" dy="0">deployment</tspan>
</text>
<line x1="115" y1="552" x2="115" y2="582" stroke="#c9d2d9" stroke-width="5" stroke-linecap="round"/>
<circle cx="115" cy="623" r="34" fill="#6d5fa8"/>
<text x="115" y="634" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff">
<tspan x="115" dy="0">5</tspan>
</text>
<rect x="175" y="585" width="1130" height="78" rx="12" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<text x="205" y="619" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#1f2933">
<tspan x="205" dy="0">Repeats</tspan>
</text>
<text x="520" y="618" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="520" dy="0">s0.20/s0.25 looked great once; s0.10 was the better default.</tspan>
</text>
<rect x="1340" y="602" width="145" height="42" rx="21" fill="#6d5fa8"/>
<text x="1412" y="630" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">
<tspan x="1412" dy="0">selection</tspan>
</text>
</svg>
