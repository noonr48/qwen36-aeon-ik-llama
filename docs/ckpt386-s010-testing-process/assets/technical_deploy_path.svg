<tspan x="235" dy="0">Why not live LoRA?</tspan>
</text>
<text x="235" y="545" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="235" dy="0">The tested production profile uses flash attention.</tspan>
<tspan x="235" dy="26">Live LoRA is not the supported serving path here.</tspan>
</text>
<rect x="850" y="455" width="520" height="150" rx="14" fill="#ffffff" stroke="#c9d2d9" stroke-width="2"/>
<rect x="850" y="455" width="10" height="150" rx="5" fill="#2f8f57"/>
<text x="880" y="503" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1f2933">
<tspan x="880" dy="0">What gets uploaded?</tspan>
</text>
<text x="880" y="545" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
