</text>
<text x="710" y="275" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" fill="#5f6f7a">
<tspan x="710" dy="0">Low-strength merge</tspan>
<tspan x="710" dy="26">kept the nudge without</tspan>
